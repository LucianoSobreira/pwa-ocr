<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor de CEP</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4.1.1/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f4f9; margin: 0; padding: 20px; }
        #video { width: 100%; max-width: 400px; border: 3px solid #333; border-radius: 12px; background: #000; }
        .controls { margin-top: 20px; text-align: center; }
        button { padding: 15px 25px; font-size: 18px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 8px; transition: 0.3s; }
        button:active { transform: scale(0.95); }
        #status { margin-top: 15px; padding: 10px; border-radius: 5px; background: #eee; min-width: 200px; text-align: center; }
    </style>
</head>
<body>
    <h2>Scanner de Etiquetas</h2>
    <video id="video" autoplay playsinline></video>
    <div class="controls">
        <button id="btn-scan">LER CEP AGORA</button>
    </div>
    <div id="status">Aguardando comando...</div>
    <canvas id="canvas" style="display:none;"></canvas>
    <script src="app.js"></script>
</body>
</html>
